<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>健康办公 - 劳逸结合 - 温情呵护 | 日程管理</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 10px;
            overflow: hidden;
        }

        /* 主容器 */
        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            overflow: hidden;
            height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
        }

        /* 头部样式 */
        .header {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
            position: relative;
            flex-shrink: 0;
        }

        .header .author-tag {
            position: absolute;
            right: 20px;
            bottom: 15px;
            font-size: 12px;
            opacity: 0.8;
            font-weight: normal;
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        /* 倒计时显示 */
        .countdown {
            padding: 10px 20px;
            text-align: center;
            font-size: 14px;
            color: #333;
            background: #f0f8ff;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }

        .countdown span {
            color: #667eea;
            font-weight: bold;
        }

        /* 设置区域 */
        .settings {
            padding: 15px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            flex-shrink: 0;
        }

        .setting-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            border-left: 3px solid #667eea;
            transition: transform 0.3s ease;
        }

        .setting-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
        }

        .setting-card h3 {
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
        }

        .setting-card h3 i {
            font-size: 14px;
            color: #667eea;
        }

        .form-group {
            margin-bottom: 8px;
        }

        .form-group label {
            display: block;
            margin-bottom: 3px;
            color: #666;
            font-size: 12px;
        }

        .form-group input {
            width: 100%;
            padding: 5px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 30px;
            height: 16px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #667eea;
        }

        input:checked + .slider:before {
            transform: translateX(14px);
        }

        /* 控制按钮 */
        .controls {
            padding: 10px 20px;
            text-align: center;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin: 0 5px;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #5a6edb;
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        /* 提醒弹窗 */
        .notification {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .notification-content {
            background: white;
            width: 90%;
            max-width: 350px;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .notification-content h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .notification-content p {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
            font-size: 13px;
        }

        .notification-content .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 16px;
            cursor: pointer;
            color: #999;
        }

        .notification-content .close-btn:hover {
            color: #333;
        }

        /* 日程表区域 - 优化占比，移除小建议后增加高度占比 */
        .schedule-section {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            background: #f8f9fa;
            flex: 1; /* 占据剩余全部空间 */
            overflow-y: auto;
        }

        .schedule-section h3 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 14px;
        }

        .schedule-section h3 i {
            color: #667eea;
            font-size: 14px;
        }

        /* 统计卡片 */
        .stats-card {
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
            gap: 8px;
        }

        .stat-item {
            background: white;
            padding: 8px;
            border-radius: 6px;
            flex: 1;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .stat-item h4 {
            color: #666;
            margin-bottom: 5px;
            font-size: 11px;
        }

        .stat-item .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
        }

        /* 日程控制：新增自定义类别样式 */
        .schedule-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .add-reminder {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }

        .custom-type-container {
            display: flex;
            gap: 5px;
            align-items: center;
            margin-top: 5px;
            width: 100%;
        }

        .custom-type-input {
            padding: 4px 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 11px;
            flex: 1;
        }

        .add-custom-type-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }

        .add-custom-type-btn:hover {
            background: #38a169;
        }

        .add-reminder select, .add-reminder input[type="time"], .add-reminder button {
            padding: 4px 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 11px;
        }

        .add-reminder button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        .add-reminder button:hover {
            background: #5a6edb;
        }

        .schedule-actions {
            display: flex;
            gap: 5px;
        }

        /* 日程表样式 */
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .schedule-table th, .schedule-table td {
            padding: 6px 8px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 11px;
        }

        .schedule-table th {
            background: #667eea;
            color: white;
            font-weight: normal;
        }

        .schedule-table tr:hover {
            background: #f8f9fa;
        }

        .schedule-table .type-tag {
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 10px;
            color: white;
        }

        .tag-water {
            background: #4299e1;
        }

        .tag-walk {
            background: #48bb78;
        }

        .tag-neck {
            background: #9f7aea;
        }

        .tag-eye {
            background: #ed8936;
        }

        .tag-temp {
            background: #e53e3e;
        }

        .tag-custom {
            background: #38b2ac;
        }

        .schedule-table .status {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-pending {
            background: #ed8936;
        }

        .status-completed {
            background: #48bb78;
        }

        .schedule-table .action-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 10px;
            margin-right: 5px;
        }

        .schedule-table .action-btn:hover {
            color: #5a6edb;
            text-decoration: underline;
        }
    </style>
    <!-- 引入图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>健康办公 - 劳逸结合 - 温情呵护</h1>
            <p>为白领定制的健康提醒 | 日程管理版</p>
            <div class="author-tag">By Ivan</div>
        </div>

        <!-- 倒计时显示 -->
        <div class="countdown">
            下次提醒：<span id="nextReminder">暂无</span>
        </div>

        <!-- 设置区域 -->
        <div class="settings">
            <!-- 喝水提醒 -->
            <div class="setting-card">
                <h3><i class="fas fa-tint"></i> 喝水提醒</h3>
                <div class="form-group">
                    <label for="waterTime">间隔（分钟）</label>
                    <input type="number" id="waterTime" value="60" min="10" max="180">
                </div>
                <div class="toggle-switch">
                    <label class="switch">
                        <input type="checkbox" id="waterToggle" checked>
                        <span class="slider"></span>
                    </label>
                    <span>开启</span>
                </div>
            </div>

            <!-- 起身活动 -->
            <div class="setting-card">
                <h3><i class="fas fa-walking"></i> 起身活动</h3>
                <div class="form-group">
                    <label for="walkTime">间隔（分钟）</label>
                    <input type="number" id="walkTime" value="90" min="15" max="180">
                </div>
                <div class="toggle-switch">
                    <label class="switch">
                        <input type="checkbox" id="walkToggle" checked>
                        <span class="slider"></span>
                    </label>
                    <span>开启</span>
                </div>
            </div>

            <!-- 肩颈放松 -->
            <div class="setting-card">
                <h3><i class="fas fa-spa"></i> 肩颈放松</h3>
                <div class="form-group">
                    <label for="neckTime">间隔（分钟）</label>
                    <input type="number" id="neckTime" value="45" min="10" max="120">
                </div>
                <div class="toggle-switch">
                    <label class="switch">
                        <input type="checkbox" id="neckToggle" checked>
                        <span class="slider"></span>
                    </label>
                    <span>开启</span>
                </div>
            </div>

            <!-- 眼睛休息 -->
            <div class="setting-card">
                <h3><i class="fas fa-eye"></i> 眼睛休息</h3>
                <div class="form-group">
                    <label for="eyeTime">间隔（分钟）</label>
                    <input type="number" id="eyeTime" value="20" min="5" max="60">
                </div>
                <div class="toggle-switch">
                    <label class="switch">
                        <input type="checkbox" id="eyeToggle" checked>
                        <span class="slider"></span>
                    </label>
                    <span>开启</span>
                </div>
            </div>
        </div>

        <!-- 控制按钮 -->
        <div class="controls">
            <button class="btn" id="saveBtn">保存并启动</button>
            <button class="btn btn-reset" id="resetBtn">重置默认</button>
        </div>

        <!-- 日程表区域 - 移除小建议后占满剩余空间 -->
        <div class="schedule-section">
            <h3><i class="fas fa-calendar-alt"></i> 今日健康日程表</h3>
            
            <!-- 统计卡片 -->
            <div class="stats-card">
                <div class="stat-item">
                    <h4>今日计划</h4>
                    <div class="stat-value" id="totalReminders">0</div>
                </div>
                <div class="stat-item">
                    <h4>已完成</h4>
                    <div class="stat-value" id="completedReminders">0</div>
                </div>
                <div class="stat-item">
                    <h4>待完成</h4>
                    <div class="stat-value" id="pendingReminders">0</div>
                </div>
            </div>

            <!-- 日程控制：新增自定义类别输入框 -->
            <div class="schedule-controls">
                <div class="add-reminder">
                    <select id="tempReminderType">
                        <option value="water">喝水</option>
                        <option value="walk">起身活动</option>
                        <option value="neck">肩颈放松</option>
                        <option value="eye">眼睛休息</option>
                    </select>
                    <input type="time" id="tempReminderTime" placeholder="选择时间">
                    <button id="addTempBtn">临时添加</button>
                    
                    <!-- 新增自定义类别输入区域 -->
                    <div class="custom-type-container">
                        <input type="text" class="custom-type-input" id="customTypeInput" placeholder="输入自定义提醒类别（如：深呼吸）">
                        <button class="add-custom-type-btn" id="addCustomTypeBtn">添加类别</button>
                    </div>
                </div>
                <div class="schedule-actions">
                    <button class="btn" id="exportScheduleBtn">导出</button>
                    <button class="btn btn-reset" id="clearCompletedBtn">清除已完成</button>
                </div>
            </div>

            <!-- 日程表 -->
            <table class="schedule-table">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>类型</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody">
                    <!-- 日程项将通过JS动态生成 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 提醒弹窗 -->
    <div class="notification" id="notification">
        <div class="notification-content">
            <span class="close-btn" id="closeBtn">&times;</span>
            <h2 id="notifyTitle">该喝水啦！</h2>
            <p id="notifyContent">长时间办公容易忘记喝水，现在请起身喝一杯水～</p>
            <button class="btn" id="confirmBtn">我已完成</button>
        </div>
    </div>

    <script>
        // 全局变量
        let timers = {}; // 存储各类提醒的定时器
        let reminderQueue = []; // 提醒队列
        let currentReminder = null; // 当前提醒
        let dailySchedule = []; // 当日日程表
        let completedReminders = []; // 已完成的提醒ID
        // 新增：自定义类别配置（存储自定义类别信息）
        let customReminderConfig = {};

        // DOM元素
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');
        const notification = document.getElementById('notification');
        const closeBtn = document.getElementById('closeBtn');
        const confirmBtn = document.getElementById('confirmBtn');
        const notifyTitle = document.getElementById('notifyTitle');
        const notifyContent = document.getElementById('notifyContent');
        const nextReminder = document.getElementById('nextReminder');
        
        // 日程相关DOM
        const scheduleBody = document.getElementById('scheduleBody');
        const totalReminders = document.getElementById('totalReminders');
        const completedRemindersEl = document.getElementById('completedReminders');
        const pendingRemindersEl = document.getElementById('pendingReminders');
        const addTempBtn = document.getElementById('addTempBtn');
        const tempReminderType = document.getElementById('tempReminderType');
        const tempReminderTime = document.getElementById('tempReminderTime');
        const exportScheduleBtn = document.getElementById('exportScheduleBtn');
        const clearCompletedBtn = document.getElementById('clearCompletedBtn');
        // 新增：自定义类别相关DOM
        const customTypeInput = document.getElementById('customTypeInput');
        const addCustomTypeBtn = document.getElementById('addCustomTypeBtn');

        // 基础提醒配置（默认值）
        let reminderConfig = {
            water: { time: 60, enabled: true, title: "该喝水啦！", content: "长时间办公容易忘记喝水，现在请起身喝一杯水～", tagClass: "tag-water" },
            walk: { time: 90, enabled: true, title: "该起身活动啦！", content: "久坐易导致血液循环不畅，现在请起身走动2-3分钟～", tagClass: "tag-walk" },
            neck: { time: 45, enabled: true, title: "该放松肩颈啦！", content: "长时间保持一个姿势容易导致肩颈酸痛，现在请放松一下～", tagClass: "tag-neck" },
            eye: { time: 20, enabled: true, title: "该让眼睛休息啦！", content: "遵循20-20-20原则：现在请看向20英尺外的物体20秒～", tagClass: "tag-eye" }
        };

        // 初始化
        window.onload = function() {
            // 加载默认值到输入框
            document.getElementById('waterTime').value = reminderConfig.water.time;
            document.getElementById('walkTime').value = reminderConfig.walk.time;
            document.getElementById('neckTime').value = reminderConfig.neck.time;
            document.getElementById('eyeTime').value = reminderConfig.eye.time;
            
            document.getElementById('waterToggle').checked = reminderConfig.water.enabled;
            document.getElementById('walkToggle').checked = reminderConfig.walk.enabled;
            document.getElementById('neckToggle').checked = reminderConfig.neck.enabled;
            document.getElementById('eyeToggle').checked = reminderConfig.eye.enabled;
            
            // 初始化今日日期
            initTodaySchedule();
            
            // 绑定事件
            addTempBtn.addEventListener('click', addTemporaryReminder);
            exportScheduleBtn.addEventListener('click', exportSchedule);
            clearCompletedBtn.addEventListener('click', clearCompletedReminders);
            // 新增：绑定自定义类别添加事件
            addCustomTypeBtn.addEventListener('click', addCustomReminderType);
        };

        // 新增：添加自定义提醒类别
        function addCustomReminderType() {
            const typeName = customTypeInput.value.trim();
            if (!typeName) {
                alert('请输入自定义提醒类别的名称！');
                return;
            }
            
            // 转换为唯一标识（小写+替换空格）
            const typeKey = typeName.toLowerCase().replace(/\s+/g, '_');
            
            // 检查是否已存在
            if (reminderConfig[typeKey] || customReminderConfig[typeKey]) {
                alert(`"${typeName}" 类别已存在，请输入其他名称！`);
                customTypeInput.value = '';
                return;
            }
            
            // 添加到自定义配置
            customReminderConfig[typeKey] = {
                name: typeName,
                title: `该${typeName}啦！`,
                content: `现在是时候进行${typeName}啦，放松一下吧～`,
                tagClass: "tag-custom"
            };
            
            // 添加到下拉列表
            const option = document.createElement('option');
            option.value = typeKey;
            option.textContent = typeName;
            tempReminderType.appendChild(option);
            
            // 清空输入框
            customTypeInput.value = '';
            alert(`成功添加自定义类别：${typeName}`);
        }

        // 初始化今日日程
        function initTodaySchedule() {
            // 清空现有日程
            dailySchedule = [];
            completedReminders = [];
            
            // 更新统计
            updateScheduleStats();
            renderScheduleTable();
        }

        // 保存设置并启动提醒
        saveBtn.addEventListener('click', function() {
            // 清除现有定时器
            clearAllTimers();
            
            // 更新基础配置
            reminderConfig.water.time = parseInt(document.getElementById('waterTime').value);
            reminderConfig.walk.time = parseInt(document.getElementById('walkTime').value);
            reminderConfig.neck.time = parseInt(document.getElementById('neckTime').value);
            reminderConfig.eye.time = parseInt(document.getElementById('eyeTime').value);
            
            reminderConfig.water.enabled = document.getElementById('waterToggle').checked;
            reminderConfig.walk.enabled = document.getElementById('walkToggle').checked;
            reminderConfig.neck.enabled = document.getElementById('neckToggle').checked;
            reminderConfig.eye.enabled = document.getElementById('eyeToggle').checked;
            
            // 生成今日重复提醒的日程
            generateRepeatingSchedule();
            
            // 启动提醒
            startReminders();
            
            // 提示
            alert('设置已保存，提醒系统已启动！');
        });

        // 生成重复提醒的日程
        function generateRepeatingSchedule() {
            // 清空现有重复提醒
            dailySchedule = dailySchedule.filter(item => item.isTemp);
            
            const now = new Date();
            const startHour = 9; // 上班开始时间
            const endHour = 18; // 下班结束时间
            
            // 为每个启用的基础提醒生成今日所有提醒时间
            for (let type in reminderConfig) {
                if (reminderConfig[type].enabled) {
                    const interval = reminderConfig[type].time * 60 * 1000;
                    let nextTime = new Date(now);
                    
                    // 设置初始时间为整点开始
                    nextTime.setHours(startHour, 0, 0, 0);
                    
                    // 生成到下班前的所有提醒时间
                    while (nextTime.getHours() < endHour) {
                        // 只添加未来的提醒
                        if (nextTime > now) {
                            addScheduleItem(type, nextTime, false);
                        }
                        nextTime = new Date(nextTime.getTime() + interval);
                    }
                }
            }
            
            // 重新渲染日程表
            renderScheduleTable();
            updateScheduleStats();
        }

        // 添加日程项（兼容自定义类别）
        function addScheduleItem(type, time, isTemp = false) {
            const id = generateId();
            // 优先取自定义配置，再取基础配置
            const config = customReminderConfig[type] || reminderConfig[type];
            
            const scheduleItem = {
                id: id,
                type: type,
                typeName: config?.name || getTypeName(type),
                time: time,
                isTemp: isTemp,
                completed: false,
                tagClass: config?.tagClass || reminderConfig[type]?.tagClass || "tag-custom"
            };
            
            dailySchedule.push(scheduleItem);
            
            // 添加到提醒队列
            reminderQueue.push({
                id: id,
                type: type,
                time: time,
                config: config || reminderConfig[type]
            });
            
            return id;
        }

        // 生成唯一ID
        function generateId() {
            return Date.now() + '-' + Math.floor(Math.random() * 1000);
        }

        // 添加临时提醒（兼容自定义类别）
        function addTemporaryReminder() {
            const type = tempReminderType.value;
            const timeStr = tempReminderTime.value;
            
            if (!timeStr) {
                alert('请选择提醒时间！');
                return;
            }
            
            // 检查类别是否有效
            if (!reminderConfig[type] && !customReminderConfig[type]) {
                alert('所选提醒类别无效，请重新选择！');
                return;
            }
            
            // 解析时间
            const [hours, minutes] = timeStr.split(':').map(Number);
            const now = new Date();
            const reminderTime = new Date(now);
            reminderTime.setHours(hours, minutes, 0, 0);
            
            // 检查时间是否在未来
            if (reminderTime <= now) {
                alert('请选择未来的时间！');
                return;
            }
            
            // 添加到日程
            const id = addScheduleItem(type, reminderTime, true);
            
            // 获取配置（兼容自定义）
            const config = customReminderConfig[type] || reminderConfig[type];
            
            // 设置一次性定时器
            const ms = reminderTime - now;
            timers[id] = setTimeout(function() {
                showNotification(type, id, config);
            }, ms);
            
            // 更新UI
            renderScheduleTable();
            updateScheduleStats();
            updateNextReminder();
            
            alert('临时提醒已添加！');
        }

        // 重置默认设置
        function resetDefaultConfig() {
            // 清除现有定时器
            clearAllTimers();
            
            // 恢复基础配置默认值
            reminderConfig = {
                water: { time: 60, enabled: true, title: "该喝水啦！", content: "长时间办公容易忘记喝水，现在请起身喝一杯水～", tagClass: "tag-water" },
                walk: { time: 90, enabled: true, title: "该起身活动啦！", content: "久坐易导致血液循环不畅，现在请起身走动2-3分钟～", tagClass: "tag-walk" },
                neck: { time: 45, enabled: true, title: "该放松肩颈啦！", content: "长时间保持一个姿势容易导致肩颈酸痛，现在请放松一下～", tagClass: "tag-neck" },
                eye: { time: 20, enabled: true, title: "该让眼睛休息啦！", content: "遵循20-20-20原则：现在请看向20英尺外的物体20秒～", tagClass: "tag-eye" }
            };
            
            // 清空自定义配置
            customReminderConfig = {};
            
            // 重置下拉列表
            tempReminderType.innerHTML = `
                <option value="water">喝水</option>
                <option value="walk">起身活动</option>
                <option value="neck">肩颈放松</option>
                <option value="eye">眼睛休息</option>
            `;
            
            // 更新输入框
            document.getElementById('waterTime').value = 60;
            document.getElementById('walkTime').value = 90;
            document.getElementById('neckTime').value = 45;
            document.getElementById('eyeTime').value = 20;
            
            document.getElementById('waterToggle').checked = true;
            document.getElementById('walkToggle').checked = true;
            document.getElementById('neckToggle').checked = true;
            document.getElementById('eyeToggle').checked = true;
            
            // 重新初始化日程
            initTodaySchedule();
            
            // 启动提醒
            startReminders();
            
            alert('已重置为默认设置（自定义类别已清空）！');
        }
        resetBtn.addEventListener('click', resetDefaultConfig);

        // 启动所有提醒
        function startReminders() {
            // 遍历基础配置，为每个启用的提醒设置定时器
            for (let type in reminderConfig) {
                if (reminderConfig[type].enabled) {
                    setRepeatingReminder(type, reminderConfig[type].time);
                }
            }
            
            // 更新下次提醒显示
            updateNextReminder();
            
            // 渲染日程表
            renderScheduleTable();
        }

        // 设置重复提醒
        function setRepeatingReminder(type, minutes) {
            // 转换为毫秒
            const ms = minutes * 60 * 1000;
            
            // 设置定时器
            timers[type] = setInterval(function() {
                showNotification(type, null, reminderConfig[type]);
            }, ms);
        }

        // 显示提醒弹窗（兼容自定义类别）
        function showNotification(type, id = null, config = null) {
            currentReminder = { type: type, id: id };
            // 优先使用传入的配置，再取自定义/基础配置
            const reminderInfo = config || customReminderConfig[type] || reminderConfig[type];
            notifyTitle.textContent = reminderInfo.title;
            notifyContent.textContent = reminderInfo.content;
            notification.style.display = 'flex';
        }

        // 关闭提醒弹窗
        function closeNotification() {
            notification.style.display = 'none';
            
            // 标记为已完成
            if (currentReminder && currentReminder.id) {
                markAsCompleted(currentReminder.id);
            }
            
            // 重新设置当前提醒的定时器（避免重复提醒）
            if (currentReminder) {
                if (currentReminder.id) {
                    clearTimeout(timers[currentReminder.id]);
                    delete timers[currentReminder.id];
                } else {
                    const type = currentReminder.type;
                    if (reminderConfig[type] && reminderConfig[type].enabled) {
                        clearInterval(timers[type]);
                        setRepeatingReminder(type, reminderConfig[type].time);
                    }
                }
                currentReminder = null;
                
                // 更新下次提醒显示
                updateNextReminder();
            }
        }

        // 标记为已完成
        function markAsCompleted(id) {
            // 更新日程表状态
            const itemIndex = dailySchedule.findIndex(item => item.id === id);
            if (itemIndex !== -1) {
                dailySchedule[itemIndex].completed = true;
                completedReminders.push(id);
                
                // 更新UI
                renderScheduleTable();
                updateScheduleStats();
            }
        }

        // 清除所有定时器
        function clearAllTimers() {
            for (let key in timers) {
                if (timers.hasOwnProperty(key)) {
                    if (key.includes('-')) {
                        clearTimeout(timers[key]);
                    } else {
                        clearInterval(timers[key]);
                    }
                    delete timers[key];
                }
            }
            timers = {};
            reminderQueue = [];
            nextReminder.textContent = '暂无';
        }

        // 更新下次提醒显示
        function updateNextReminder() {
            if (reminderQueue.length === 0) {
                nextReminder.textContent = '暂无';
                return;
            }
            
            // 找到最近的提醒
            reminderQueue.sort((a, b) => a.time - b.time);
            const nearest = reminderQueue[0];
            
            // 格式化时间显示
            const hours = nearest.time.getHours().toString().padStart(2, '0');
            const minutes = nearest.time.getMinutes().toString().padStart(2, '0');
            const seconds = nearest.time.getSeconds().toString().padStart(2, '0');
            
            // 获取类别名称（兼容自定义）
            const typeName = nearest.config?.name || getTypeName(nearest.type);
            
            nextReminder.textContent = `${hours}:${minutes}:${seconds} (${typeName})`;
        }

        // 获取提醒类型名称（兼容自定义）
        function getTypeName(type) {
            if (customReminderConfig[type]) {
                return customReminderConfig[type].name;
            }
            const names = {
                water: '喝水',
                walk: '起身活动',
                neck: '肩颈放松',
                eye: '眼睛休息'
            };
            return names[type] || type;
        }

        // 渲染日程表（兼容自定义类别）
        function renderScheduleTable() {
            // 清空表格
            scheduleBody.innerHTML = '';
            
            // 按时间排序
            const sortedSchedule = [...dailySchedule].sort((a, b) => a.time - b.time);
            
            // 生成表格行
            sortedSchedule.forEach(item => {
                const tr = document.createElement('tr');
                
                // 时间列
                const timeTd = document.createElement('td');
                const hours = item.time.getHours().toString().padStart(2, '0');
                const minutes = item.time.getMinutes().toString().padStart(2, '0');
                timeTd.textContent = `${hours}:${minutes}`;
                
                // 类型列（显示自定义名称）
                const typeTd = document.createElement('td');
                const tag = document.createElement('span');
                tag.className = `type-tag ${item.tagClass}`;
                tag.textContent = item.typeName || getTypeName(item.type) + (item.isTemp ? '（临时）' : '');
                typeTd.appendChild(tag);
                
                // 状态列
                const statusTd = document.createElement('td');
                const statusDot = document.createElement('span');
                statusDot.className = `status ${item.completed ? 'status-completed' : 'status-pending'}`;
                statusTd.appendChild(statusDot);
                statusTd.appendChild(document.createTextNode(item.completed ? '已完成' : '待完成'));
                
                // 操作列
                const actionTd = document.createElement('td');
                if (!item.completed) {
                    const completeBtn = document.createElement('button');
                    completeBtn.className = 'action-btn';
                    completeBtn.textContent = '完成';
                    completeBtn.onclick = () => {
                        markAsCompleted(item.id);
                        if (timers[item.id]) {
                            clearTimeout(timers[item.id]);
                            delete timers[item.id];
                        }
                    };
                    actionTd.appendChild(completeBtn);
                    
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'action-btn';
                    deleteBtn.textContent = '删除';
                    deleteBtn.onclick = () => {
                        // 从日程表中删除
                        dailySchedule = dailySchedule.filter(i => i.id !== item.id);
                        // 从提醒队列中删除
                        reminderQueue = reminderQueue.filter(i => i.id !== item.id);
                        // 清除定时器
                        if (timers[item.id]) {
                            clearTimeout(timers[item.id]);
                            delete timers[item.id];
                        }
                        // 更新UI
                        renderScheduleTable();
                        updateScheduleStats();
                        updateNextReminder();
                    };
                    actionTd.appendChild(deleteBtn);
                }
                
                // 添加到行
                tr.appendChild(timeTd);
                tr.appendChild(typeTd);
                tr.appendChild(statusTd);
                tr.appendChild(actionTd);
                
                // 添加到表格
                scheduleBody.appendChild(tr);
            });
        }

        // 更新日程统计
        function updateScheduleStats() {
            const total = dailySchedule.length;
            const completed = dailySchedule.filter(item => item.completed).length;
            const pending = total - completed;
            
            totalReminders.textContent = total;
            completedRemindersEl.textContent = completed;
            pendingRemindersEl.textContent = pending;
        }

        // 导出日程表（兼容自定义类别）
        function exportSchedule() {
            if (dailySchedule.length === 0) {
                alert('暂无日程可导出！');
                return;
            }
            
            // 生成导出内容
            let content = '今日健康办公日程表\n';
            content += '=====================\n';
            content += `生成时间：${new Date().toLocaleString()}\n\n`;
            
            // 按时间排序
            const sortedSchedule = [...dailySchedule].sort((a, b) => a.time - b.time);
            
            sortedSchedule.forEach((item, index) => {
                const time = `${item.time.getHours().toString().padStart(2, '0')}:${item.time.getMinutes().toString().padStart(2, '0')}`;
                const type = item.typeName || getTypeName(item.type) + (item.isTemp ? '（临时）' : '');
                const status = item.completed ? '已完成' : '待完成';
                
                content += `${index + 1}. ${time} - ${type} - ${status}\n`;
            });
            
            // 创建下载链接
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `健康办公日程表_${new Date().toLocaleDateString().replace(/\//g, '-')}.txt`;
            a.click();
            
            // 释放URL
            URL.revokeObjectURL(url);
        }

        // 清除已完成的提醒
        function clearCompletedReminders() {
            if (confirm('确定要清除所有已完成的提醒吗？')) {
                // 过滤掉已完成的
                dailySchedule = dailySchedule.filter(item => !item.completed);
                // 从提醒队列中删除已完成的
                reminderQueue = reminderQueue.filter(item => {
                    return !dailySchedule.some(i => i.id === item.id && i.completed);
                });
                // 清空已完成列表
                completedReminders = [];
                // 更新UI
                renderScheduleTable();
                updateScheduleStats();
                updateNextReminder();
                
                alert('已清除所有已完成的提醒！');
            }
        }

        // 绑定弹窗关闭事件
        closeBtn.addEventListener('click', closeNotification);
        confirmBtn.addEventListener('click', closeNotification);

        // 点击弹窗外区域关闭
        notification.addEventListener('click', function(e) {
            if (e.target === notification) {
                closeNotification();
            }
        });
    </script>
</body>
